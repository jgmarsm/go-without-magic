service:
  name: "user-service"
  version: "1.0.0"
  environment: "local"   # local | staging | production

server:
  http_port: 8080
  shutdown_timeout: 30s
  read_timeout: 10s
  write_timeout: 10s

database:
  dsn: "postgres://user:pass@localhost:5432/mydb?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

observability:
  log_level: "debug"     # debug | info | warn | error